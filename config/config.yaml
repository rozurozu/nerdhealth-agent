# ============================================================================
# config.yaml (seed) — Hermes のモデル設定
#
# これは「種」。scripts/seed.sh で ./data/config.yaml にコピーされ、
# コンテナ内では /opt/data/config.yaml として読まれる。
# 既に ./data/config.yaml がある場合 seed.sh は上書きしない（Hermes 自身の編集を尊重）。
# ============================================================================

model:
  # 日々の問診・催促はこれで十分（低レイテンシ・定額）
  default: fugu
  provider: custom
  base_url: https://api.sakana.ai/v1

  # Hermes はツール利用に最低 64,000 トークンの context を要求し、足りないと起動拒否する。
  # Fugu がこれを満たすかは初回起動ログで確認すること（拒否されたら fugu-ultra 等に変更）。
  context_length: 64000

# 週次の重い調査・分析だけ上位モデルに上げたい場合、cron ジョブ側で model: fugu-ultra を指定する
# （定額プランが fugu-ultra を含むかはコンソールで確認）。

# --- 将来 local LLM を別マシンに用意したときの差し替え例 --------------------
# 同じ custom 枠で base_url を差し替えるだけ。ローカル優先＋クラウド予備も可能。
# model:
#   default: <local-model-name>
#   provider: custom
#   base_url: http://<別マシンのLAN IP>:11434/v1   # Ollama の OpenAI 互換は /v1 まで必須
#   context_length: 64000
# fallback_providers:
#   - provider: custom
#     base_url: https://api.sakana.ai/v1
#     model: fugu
# ※ local マシンは LAN(RFC1918) 上なので、firewall.sh の egress 牢でその 1 ホストだけ例外許可する。

# --- cron pre-script のタイムアウト（必要なら） -----------------------------
# cron:
#   script_timeout_seconds: 120
