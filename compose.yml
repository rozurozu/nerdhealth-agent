# ============================================================================
# Hermes 健康管理エージェント — Docker Compose
#
# 役割: 「Hermes 本体」ではなく「Hermes を運用する設定」を管理する。
# データ(記憶/SQLite/セッション/鍵)はすべて ./data (= コンテナ内 /opt/data) に貯まる。
# ./data は git 管理しない。失うと全履歴が消えるので scripts/backup.sh で退避する。
# ============================================================================

services:
  hermes:
    # NOTE: 本番では :latest をやめて具体バージョンに固定する（例 :v2026.4.16）。
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    command: gateway run
    restart: unless-stopped

    # 秘密(APIキー・Discord等)は env_file で渡さない。Hermes が /opt/data/.env(= ./data/.env)を
    # ネイティブに読む（/sethome もそこへ書く）。源を1本に絞り、二重参照の混乱を避ける。
    environment:
      # コンテナ内のデータ基底を /opt/data に固定（これにより /opt/data/.env が読まれる）
      HERMES_HOME: /opt/data

    volumes:
      # 唯一の永続領域。SOUL.md / config.yaml / cron / memories / skills / SQLite が入る
      - ./data:/opt/data

    # --- 公開ポート: ダッシュボードは loopback のみ（LAN に晒さない） ---------
    ports:
      - "127.0.0.1:8642:8642"

    # --- 安全境界（egress 優先ハードニング） ----------------------------------
    # 自分でスキルを書いて実行するエージェントなので、コンテナ自体をサンドボックスにする。
    security_opt:
      - no-new-privileges:true
    # s6-overlay の初期化(root→専用ユーザーへの権限降格)に必要な cap だけ残し、他は全部落とす。
    # cap_drop: ALL だけにすると s6-applyuidgid が setgroups/chown できず code 111 で起動ループする。
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - KILL
      - SETPCAP
    # フォールバック: それでも 111 ループが続くなら、まず動かす優先で上の cap_drop/cap_add を
    #   まるごとコメントアウトする（Docker 既定の cap に戻る。macOS お試しはこれで十分）。
    # TODO(prod): Linux 本番ではここを締め直す。cap_drop:ALL を活かしたまま、起動する最小 cap を
    #   ログで検証して確定する。お試しでコメントアウトした場合は必ず元に戻すこと。
    # read_only: true は自己書き込み性質と衝突しやすいので初期は付けない。
    #   付けるなら /tmp と /run を tmpfs にし、/opt/data だけ書込可にして検証する。

    # --- リソース制限（2011 Mac mini を守る） ---------------------------------
    mem_limit: 2g
    cpus: "1.5"

    # --- ネットワーク ---------------------------------------------------------
    # 専用 bridge に隔離。RFC1918(LAN/ホスト) 宛の遮断は scripts/firewall.sh で
    # ホスト側 nftables/iptables(DOCKER-USER) に入れる（compose だけでは塞げない）。
    # TODO(prod): Linux 本番で scripts/firewall.sh の egress 牢を適用する
    #   （make subnet → sudo make firewall SUBNET=...）。macOS お試しでは効かないため未適用。
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
