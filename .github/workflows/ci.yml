# CI / Deploy — 検証してから（成功時のみ）稼働ホストへ反映する単一ワークフロー。
#
#   validate : PR / push / 手動 で常に走る検証（壊れた設定を main に入れない）
#   reseed   : validate 成功が前提（needs）。main への push で種(prompts/ config/)が
#              変わったとき、または手動実行のときだけ、稼働中の hermes へ make reseed で反映。
#
# reseed は SOUL.md / config.yaml をコンテナ所有の ./data へ上書きして再起動するだけ
# （SQLite・data/.env は不変＝データ非破壊）。ランナーの自動チェックアウトでは動かさず、
# 稼働ディレクトリ（既定 /opt/nerdhealth-agent。リポジトリ変数 DEPLOY_DIR で変更可）で実行する。
name: CI / Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# 同一 ref の実行を直列化（validate→reseed の最中に次の push が割り込んでデプロイが交差しないように）。
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    # 専用セルフホストランナーが 1 台なら self-hosted だけで確実に当たる。
    # 複数ランナーを使い分けるなら [self-hosted, Linux] 等にラベルを足す。
    runs-on: [self-hosted]
    outputs:
      seed_changed: ${{ steps.changes.outputs.seed }}
    steps:
      - uses: actions/checkout@v5   # v4 は Node20 で非推奨警告。v5 は Node24。
        with:
          fetch-depth: 0   # 後段の差分判定で push 前コミット(before)が要るため全history取得

      # main への push で prompts/ または config/ が変わったかを判定し、reseed の発火条件に使う。
      # 値（SHA・イベント名）は env 経由で渡す（run へ直接展開しない＝injection 対策）。
      - name: 種ファイル(prompts/ config/)の変更有無を判定
        id: changes
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          seed=false
          if [ "$EVENT" = "push" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            if git diff --name-only "$BEFORE" "$AFTER" | grep -qE '^(prompts/|config/)'; then
              seed=true
            fi
          fi
          echo "seed=$seed" >> "$GITHUB_OUTPUT"
          echo "seed_changed=$seed"

      # scripts/*.sh の静的解析。info/style（SC1091: host.env 未追跡 等）は許容差なので
      # warning 以上だけ失敗扱い。lint は Docker 経由でホストを汚さない。
      - name: ShellCheck (scripts/*.sh)
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable \
            --severity=warning scripts/*.sh

      - name: compose.yml を検証 (docker compose config)
        run: docker compose config -q

      - name: config.yaml の YAML parse 検証
        run: |
          docker run --rm -v "$PWD:/w" -w /w mikefarah/yq:latest \
            '.' config/config.yaml > /dev/null

  reseed:
    needs: validate                       # ← validate 成功が前提。失敗すれば reseed はスキップ。
    # 手動実行 か、main への push で種が変わったときだけ反映する（PR では走らせない）。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && needs.validate.outputs.seed_changed == 'true')
    runs-on: [self-hosted]
    env:
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/nerdhealth-agent' }}
    steps:
      # 稼働ディレクトリを origin/main に厳密同期。./data・host.env は gitignore 済みで消えない。
      - name: 稼働ディレクトリを origin/main へ同期
        run: |
          cd "$DEPLOY_DIR"
          git fetch --prune origin
          git checkout main
          git reset --hard origin/main
          echo "deployed commit:"
          git log -1 --oneline

      - name: 種を再投入して再起動 (make reseed)
        run: |
          cd "$DEPLOY_DIR"
          make reseed

      # 再起動後に hermes が定常稼働しているか（crash-loop 検知）。
      - name: 稼働確認
        run: |
          cd "$DEPLOY_DIR"
          docker compose ps
          sleep 5
          state="$(docker inspect -f '{{.State.Status}}' hermes)"
          echo "hermes state: $state"
          test "$state" = "running"
          docker compose logs --since 60s --no-color hermes | tail -n 40
